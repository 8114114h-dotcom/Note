name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python_version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt update
          # تم تحديث المكتبات هنا لتناسب Ubuntu 24.04 (Noble)
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses6 libncursesw6 libtinfo6 cmake libffi-dev libssl-dev
          pip3 install --user --upgrade buildozer
          pip3 install --user Cython==0.29.33

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # إضافة --requirements للـ Buildozer لضمان تحميل المكتبات اللازمة
          buildozer -v android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: study-app-apk
          path: bin/*.apk
